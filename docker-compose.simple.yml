# CodeLens Platform - Simple Docker Compose (Optional)
# Use this when Docker is available for easier dependency management

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: codelens-postgres
    environment:
      POSTGRES_DB: codelens_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: codelens-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Elasticsearch (Optional - for search service)
  elasticsearch:
    image: elasticsearch:8.8.0
    container_name: codelens-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    profiles:
      - search

  # Kibana (Optional - for search service UI)
  kibana:
    image: kibana:8.8.0
    container_name: codelens-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    profiles:
      - search

  # ClickHouse (Optional - for analytics service)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: codelens-clickhouse
    environment:
      CLICKHOUSE_DB: codelens_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    profiles:
      - analytics

  # Prometheus (Optional - for monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: codelens-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    profiles:
      - monitoring

  # Grafana (Optional - for monitoring dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: codelens-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: codelens-network
